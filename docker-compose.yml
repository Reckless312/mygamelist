services:
  frontend:
    build:
      context: ./mygamelist
    environment:
      - APP_URL=http://mygamelist.local:8080
      - STEAM_API_KEY=${STEAM_API_KEY}
      - BACKEND_API=http://backend-1:8080
    depends_on:
      - backend-1
      - backend-2
    restart: unless-stopped

  backend-1:
    build: ./mygamelist-server
    environment:
      - DATABASE_URL=mysql://mygamelist:${DB_PASSWORD}@db-master:3306/mygamelist
      - CORS_ORIGINS=http://mygamelist.local:8080,https://mygamelist.local:8443
    depends_on:
      db-master:
        condition: service_healthy
    restart: unless-stopped

  backend-2:
    build: ./mygamelist-server
    environment:
      - DATABASE_URL=mysql://mygamelist:${DB_PASSWORD}@db-master:3306/mygamelist
      - CORS_ORIGINS=http://mygamelist.local:8080,https://mygamelist.local:8443
    depends_on:
      db-master:
        condition: service_healthy
    restart: unless-stopped

  db-master:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=mygamelist
      - MYSQL_USER=mygamelist
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-master-data:/var/lib/mysql
      - ./mysql/master/my.cnf:/etc/mysql/conf.d/master.cnf:ro
      - ./mysql/master/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-slave:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=mygamelist
      - MYSQL_USER=mygamelist
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-slave-data:/var/lib/mysql
      - ./mysql/slave/my.cnf:/etc/mysql/conf.d/slave.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      db-master:
        condition: service_healthy
    restart: unless-stopped

  replication-setup:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - ./mysql/setup-replication.sh:/setup-replication.sh:ro
    depends_on:
      db-master:
        condition: service_healthy
      db-slave:
        condition: service_healthy
    command: sh /setup-replication.sh
    restart: no

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      - PMA_HOST=db-master
      - PMA_USER=root
      - PMA_PASSWORD=${DB_ROOT_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - db-master
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend-1
      - backend-2
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle
    environment:
      - DOZZLE_BASE=/logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  db-master-data:
  db-slave-data:
